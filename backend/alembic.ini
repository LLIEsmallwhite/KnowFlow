# Alembic 数据库迁移配置

[alembic]
# 迁移脚本目录
script_location = migrations

# 日志配置
# file_template = %%(rev)s_%%(slug)s

# 数据库连接 URL（将被 env.py 中的代码覆盖）
# 此处作为回退值
sqlalchemy.url = postgresql://knowflow:knowflow_secret@localhost:5432/knowflow

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
